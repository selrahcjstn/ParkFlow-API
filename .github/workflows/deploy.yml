name: Deploy ParkFlow API to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Pull code using the updated Node 24 action
    - name: Checkout Code
      uses: actions/checkout@v6

    # 2. Setup .NET environment using the updated Node 24 action
    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '8.0'

    # 3. Compile targeting the specific API project directly to isolate the output directory
    - name: Publish API
      run: |
        dotnet restore ParkFlow.API/ParkFlow.API.csproj
        dotnet publish ParkFlow.API/ParkFlow.API.csproj -c Release -r linux-x64 --self-contained false -o ./publish

    # 4. Shut down service so Linux file handles are safely released
    - name: Stop ParkFlow Service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo systemctl stop parkflow

    # 5. Clean binaries, assemblies, and layout bundles while protecting production variables
    - name: Clean Deployment Directory Safely
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          find /home/ubuntu/app/ -maxdepth 1 -type f ! -name 'appsettings.Production.json' -delete

    # 6. Copy clean, fresh binaries directly into the app path
    - name: Copy Files via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "./publish/*"
        target: "/home/ubuntu/app"
        strip_components: 1

    # 7. Complete a clean service boot sequence
    - name: Start ParkFlow Service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo systemctl daemon-reload
          sudo systemctl start parkflow
          sudo systemctl status parkflow --no-pager -l
