name: Deploy ParkFlow API to EC2

on:
  push:
    branches:
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Setup .NET SDK
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0'

    - name: Publish API Application
      run: |
        dotnet restore ParkFlow.API/ParkFlow.API.csproj
        dotnet publish ParkFlow.API/ParkFlow.API.csproj -c Release -r linux-x64 --self-contained false -o ./publish

    - name: Stop Live Application Service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo systemctl stop parkflow

    - name: Purge Stale Application Binaries
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          if [ -d "/home/ubuntu/app/publish" ]; then
            find /home/ubuntu/app/publish/ -maxdepth 1 -type f -delete
          fi

    - name: Deploy Fresh Binaries via SCP
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        source: "./publish/*"
        target: "/home/ubuntu/app/publish"
        strip_components: 1

    - name: Initialize and Start Service
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ${{ secrets.EC2_USERNAME }}
        key: ${{ secrets.EC2_SSH_KEY }}
        script: |
          sudo systemctl daemon-reload
          sudo systemctl start parkflow
          sudo systemctl status parkflow --no-pager -l
